name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [arm64, amd64]

    steps:
    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.26.x'

    - name: Check out code
      uses: actions/checkout@v7

    - name: Get dependencies
      run: go get -v -d ./...

    - name: Build
      run: GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -v -o vault-kv-search-${{ matrix.goos }}-${{ matrix.goarch }}

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: vault-kv-search-${{ matrix.goos }}-${{ matrix.goarch }}
        path: ./vault-kv-search-${{ matrix.goos }}-${{ matrix.goarch }}

  release:
    needs: [release-please, build]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v7

    - name: Download artifacts
      uses: actions/download-artifact@v8

    - name: Prep binaries
      run: |
        mkdir tmp
        mv vault-kv-search-*/* tmp

    - name: Generate SHA256 Checksum
      run: |
        cd tmp
        shasum -a 256 vault-kv-search-* > sha256sums.txt

    - name: Update Release and Upload Assets
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ needs.release-please.outputs.tag_name }}
        draft: false
        prerelease: false
        files: |
          ./tmp/sha256sums.txt
          ./tmp/vault-kv-search-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [release-please, release]
    if: ${{ needs.release-please.outputs.release_created }}
    runs-on: ubuntu-latest
    env:
      TAG: ${{ needs.release-please.outputs.tag_name }}
    steps:
    - name: Bump tap formula
      env:
        COMMITTER_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      run: |
        set -euo pipefail

        TARBALL="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
        SHA256=$(curl -fsSL "$TARBALL" | sha256sum | cut -d' ' -f1)
        echo "tarball=$TARBALL sha256=$SHA256"

        git clone "https://x-access-token:${COMMITTER_TOKEN}@github.com/xbglowx/homebrew-tap.git" tap
        cd tap

        FORMULA="Formula/vault-kv-search.rb"
        sed -i -E \
          -e "s|^(\s*url\s+\").*(\".*)|\1${TARBALL}\2|" \
          -e "s|^(\s*sha256\s+\").*(\".*)|\1${SHA256}\2|" \
          "$FORMULA"

        if git diff --quiet; then
          echo "Formula already up to date"
          exit 0
        fi

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add "$FORMULA"
        git commit -m "chore: update vault-kv-search to ${TAG}"
        git push origin HEAD:main
